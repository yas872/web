<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Layout</title>
  <style>
    body {
      background: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 250px;
      height: 500px;
      background: #f2f2f2;
      border: 2px solid purple;
      border-radius: 8px;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    .line {
      width: 100%;
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .spacer {
      flex-grow: 1;
    }

    .avatar {
      width: 60px;
      height: 60px;
      background: #ccc;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    .small-line {
      width: 60%;
      height: 10px;
      background: #ddd;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Company Logo</div>

    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>

    <div class="spacer"></div>

    <div class="avatar"></div>
    <div class="small-line"></div>
  </div>

</body>
</html>
