<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato</title>
</head>
<body>

<h1>Formulário de Contato</h1>

<p>Preencha todos os campos corretamente.</p>

<form>

<label for="nome">Nome:</label>
<input type="text" id="nome" required placeholder="Digite seu nome"><br><br>

<label for="email">Email:</label>
<input type="email" id="email" required placeholder="Digite seu email"><br><br>

<label for="assunto">Assunto:</label>
<input type="text" id="assunto"><br><br>

<label for="estado">Estado:</label>
<select id="estado">
<option>SC</option>
<option>PR</option>
<option>RS</option>
</select><br><br>

<label for="mensagem">Mensagem:</label><br>
<textarea id="mensagem" placeholder="Digite sua mensagem"></textarea><br><br>

<button type="submit">Enviar</button>

</form>

<br>
<a href="4_curriculo.html">Voltar para Currículo</a>

</body>
</html>
