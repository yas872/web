<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela Estados</title>
</head>
<body>

<h1>Estados do Brasil</h1>

<table border="1">

        <th>#</th>
        <th>Região</th>
        <th>Estado</th>
        <th>Sigla</th>

    <tr>

    <tr>
        <td>2</td>
        <td><a href="https://pt.wikipedia.org/wiki/Paraná">Paraná</a></td>
        <td>PR</td>
        <td>Curitiba</td>
    </tr>

    <tr>
        <td>3</td>
        <td><a href="https://pt.wikipedia.org/wiki/Rio_Grande_do_Sul">Rio Grande do Sul</a></td>
        <td>RS</td>
        <td>Porto Alegre</td>
    </tr>

</table>

</body>
</html>
